<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="김목수이야기 - 연차 관리">
    <meta property="og:description" content="팀원 연차 신청 및 잔여 현황을 확인하세요.">
    <meta property="og:image" content="https://idong2300.github.io/kimmoksu/og-image.png">
    <meta property="og:locale" content="ko_KR">

    <title>김목수이야기 - 연차 관리</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root { --bg-deep: #131722; --sidebar-bg: #1e222d; --card-bg: #2a2e39; --primary-accent: #5c7cfa; --success-btn: #0ca678; --danger-btn: #e03131; }
        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        
        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; }
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 1050; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding: 30px; transition: background-color 0.3s; }
        .content-width { max-width: 1000px; margin: 0 auto; width: 100%; padding-bottom: 80px; }
        
        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        .input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 0.95rem !important; }
        
        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        /* 연차 달력 스타일 */
        .cal-day-box { background: #1e222d; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; min-height: 80px; padding: 6px; cursor: pointer; transition: 0.2s; position: relative; }
        .cal-day-box:hover { border-color: var(--primary-accent); background: rgba(92, 124, 250, 0.1); }
        .cal-date-num { font-size: 0.85rem; font-weight: bold; text-align: left; margin-bottom: 5px; }
        
        .cal-bar-container { display: flex; flex-direction: column; gap: 3px; margin-top: 5px; width: 100%; }
        .cal-bar { height: 8px; border-radius: 4px; box-shadow: inset 0 0 2px rgba(0,0,0,0.3); }
        .bar-pending { background-color: #6c757d; opacity: 0.7; }
        .bar-approved { background-color: #10b981; }
        .bar-full { width: 100%; }
        .bar-am { width: 50%; float: left; border-radius: 4px 0 0 4px; }
        .bar-pm { width: 50%; float: right; border-radius: 0 4px 4px 0; margin-left: 50%; }

        .cal-accordion-content { background: #131722; border-radius: 12px; margin-top: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        .leave-detail-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 12px 18px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid transparent; }
        .leave-detail-item.approved-row { border-left-color: #10b981; }
        .monthly-list-box { background: #181b24; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; }

        .table-dark { --bs-table-bg: transparent; --bs-table-color: #f8fafc; border-color: rgba(255,255,255,0.1); }
        .table-dark th { color: #94a3b8; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .table-dark td { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px; }

        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-backdrop-custom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }

        /* 화이트 모드 설정 */
        body.light-mode { background-color: #f4f6f8; color: #212529; }
        body.light-mode .main-container, body.light-mode #auth-overlay { background-color: #f4f6f8; }
        body.light-mode .sidebar { background-color: #ffffff; border-right: 1px solid #dee2e6; }
        body.light-mode .t5-card, body.light-mode .modal-box, body.light-mode .cal-accordion-content, body.light-mode .monthly-list-box, body.light-mode .leave-detail-item { background-color: #ffffff !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #dee2e6 !important; }
        body.light-mode .input-dark, body.light-mode select.input-dark { background-color: #f8f9fa !important; border: 1px solid #ced4da !important; color: #212529 !important; }
        body.light-mode .text-white, body.light-mode h5, body.light-mode h6 { color: #212529 !important; }
        body.light-mode .nav-link { color: #495057; }
        body.light-mode .nav-link:hover, body.light-mode .nav-link.active { background-color: #eef2ff; color: var(--primary-accent); }
        body.light-mode .table-dark { --bs-table-bg: #ffffff; --bs-table-color: #212529; border-color: #dee2e6; }
        body.light-mode .table-dark th { color: #495057; background-color: #f8f9fa; }
        body.light-mode .table-dark td { border-color: #dee2e6; }
        body.light-mode .cal-day-box { background: #f8f9fa; border-color: #dee2e6; }
        body.light-mode .cal-day-box:hover { background: #eef2ff; }
        body.light-mode img[src*="logo"] { filter: invert(1) grayscale(100%) contrast(200%); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-container { padding: 15px; }
            .mobile-menu-btn { display: flex !important; }
            .cal-day-box { min-height: 60px; padding: 4px; }
        }
        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; cursor: pointer; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <img src="kimmoksu_main_logo.png" style="max-width: 180px; margin-bottom: 30px;">
        <h3 class="mb-4 fw-bold text-white">현장 관리 접속</h3>
        <input type="email" id="userEmail" class="form-control input-dark mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control input-dark mb-3" placeholder="비밀번호">
        
        <div class="d-flex justify-content-between align-items-center mb-4 ms-1">
            <div class="form-check text-start m-0">
                <input class="form-check-input" type="checkbox" id="autoLoginCheck" checked>
                <label class="form-check-label small text-secondary" for="autoLoginCheck">자동 로그인</label>
            </div>
            <span class="small text-info cursor-pointer" onclick="resetPassword()">비밀번호 찾기</span>
        </div>

        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="handleAuth()">접속하기</button>
    </div>
</div>

<div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px; cursor: pointer;" onclick="location.href='index.html'">
        </div>
        <div class="flex-grow-1 mt-3">
            <div class="nav-link" onclick="location.href='index.html#home'"><i class="bi bi-house-door"></i> 홈 메인</div>
            <div class="nav-link text-warning" onclick="location.href='index.html#team'"><i class="bi bi-people-fill"></i> 팀원 및 조직 관리</div>
            <hr class="border-secondary border-opacity-25 mx-3">
            <div class="nav-link" onclick="location.href='calendar.html'"><i class="bi bi-calendar-check"></i> 마스터 스케줄러</div>
            <div class="nav-link" onclick="location.href='index.html#status'"><i class="bi bi-gear-wide-connected"></i> 종합 상황판</div>
            <div class="nav-link" onclick="location.href='index.html#gantt'"><i class="bi bi-calendar3"></i> 공정표 & 추가공사</div>
            <div class="nav-link" onclick="location.href='index.html#worklog'"><i class="bi bi-journal-text"></i> 작업일보</div>
            <div class="nav-link" onclick="location.href='index.html#punch'"><i class="bi bi-ui-checks"></i> 펀치리스트</div>
            <div class="nav-link" onclick="location.href='index.html#t5'"><i class="bi bi-calculator"></i> T5 계산기</div>
            <div class="nav-link active"><i class="bi bi-calendar2-check"></i> 연차 관리</div>
            <div class="nav-link" onclick="location.href='index.html#memo'"><i class="bi bi-stickies"></i> 메모장</div>
            <div class="nav-link" onclick="location.href='index.html#profile'"><i class="bi bi-person-gear"></i> 내 정보 수정</div>
        </div>
        <div class="px-4 py-3 mt-auto">
            <button class="btn btn-outline-secondary btn-sm w-100 d-flex justify-content-center align-items-center gap-2" onclick="toggleTheme()">
                <i class="bi bi-brightness-high-fill"></i> <span>화이트/블랙 전환</span>
            </button>
        </div>
        <div class="p-4 border-top border-secondary border-opacity-10">
            <div class="d-flex align-items-center mb-2">
                <i class="bi bi-person-circle fs-3 me-3" style="color:var(--primary-accent);"></i>
                <div class="flex-grow-1 overflow-hidden">
                    <div id="userNickDisplay" class="fw-bold text-truncate text-white">사용자</div>
                    <div id="userRoleDisplay" class="small text-secondary" style="font-size:0.7rem;">로딩중...</div>
                </div>
            </div>
            <button class="btn btn-outline-danger btn-sm w-100 mt-2" onclick="auth.signOut(); location.reload();">로그아웃</button>
        </div>
    </nav>

    <main class="main-container">
        <div class="content-width">
            <h3 class="fw-bold mb-4 text-white"><i class="bi bi-calendar2-check me-2" style="color:#9b59b6;"></i>김목수 이야기 연차 현황</h3>
            
            <div class="t5-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center border-bottom border-secondary border-opacity-25 pb-3 mb-3">
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <h5 class="fw-bold text-white m-0"><i class="bi bi-calendar-month me-2 text-primary"></i>휴가 달력</h5>
                        <div class="d-flex gap-2">
                            <select id="calYear" class="form-select form-select-sm input-dark fw-bold" style="width:auto; min-width:90px;" onchange="renderLeaveCalendar()"></select>
                            <select id="calMonth" class="form-select form-select-sm input-dark fw-bold" style="width:auto; min-width:80px;" onchange="renderLeaveCalendar()"></select>
                        </div>
                    </div>
                </div>
                
                <div id="leaveCalendar" class="text-center mb-2" style="font-size:0.85rem;"></div>
                
                <div id="calAccordionArea" style="display:none;">
                    <div class="cal-accordion-content" id="calAccordionContent"></div>
                </div>
                
                <div class="mt-5 border-top border-secondary border-opacity-25 pt-4">
                    <h5 class="fw-bold text-info mb-3"><i class="bi bi-list-check me-2"></i>이번 달 신청 내역</h5>
                    <div class="monthly-list-box" id="monthlyLeaveList"></div>
                </div>
            </div>
            
            <div class="t5-card border border-warning border-opacity-50" id="leaveAdminPanel" style="display:none;">
                <div class="d-flex justify-content-between align-items-center cursor-pointer" data-bs-toggle="collapse" data-bs-target="#leaveAdminCollapse">
                    <h5 class="fw-bold text-warning m-0"><i class="bi bi-gear me-2"></i>[관리자용] 연차 정보 관리</h5>
                    <i class="bi bi-chevron-down text-warning fs-5"></i>
                </div>
                <div class="collapse mt-4" id="leaveAdminCollapse">
                    <div class="table-responsive">
                        <table class="table table-dark align-middle text-center mb-0">
                            <thead class="text-secondary">
                                <tr><th>팀원 이름</th><th>입사일(초기화기준)</th><th>기본 부여(일)</th><th>추가 부여(일)</th></tr>
                            </thead>
                            <tbody id="leaveAdminBody"></tbody>
                        </table>
                    </div>
                    <div class="text-end mt-4">
                        <button class="btn btn-warning fw-bold px-4" onclick="saveLeaveSettings()">설정 최종 저장</button>
                    </div>
                </div>
            </div>

            <div class="t5-card border border-success border-opacity-25">
                <div class="d-flex justify-content-between align-items-center cursor-pointer" data-bs-toggle="collapse" data-bs-target="#leaveStatusCollapse">
                    <h5 class="fw-bold m-0 text-success"><i class="bi bi-person-check me-2"></i>남은 연차 현황</h5>
                    <i class="bi bi-chevron-down text-success fs-5"></i>
                </div>
                <div class="collapse show mt-4" id="leaveStatusCollapse">
                    <div class="table-responsive">
                        <table class="table table-dark align-middle text-center mb-0 fs-6">
                            <thead class="text-secondary">
                                <tr><th>이름</th><th>입사/초기화일</th><th>총 부여 (기본+추가)</th><th>사용 일수</th><th>남은 연차</th></tr>
                            </thead>
                            <tbody id="leaveStatusBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')"><i class="bi bi-list"></i></button>
</div>

<div class="modal-backdrop-custom" id="leaveApplyModal">
    <div class="modal-box">
        <h5 class="fw-bold mb-4 text-white">휴가 신청</h5>
        <div class="row g-3">
            <div class="col-12">
                <label class="small text-secondary mb-1">선택된 날짜</label>
                <input type="text" id="applyLeaveDate" class="form-control input-dark fw-bold text-primary" readonly>
            </div>
            <div class="col-12">
                <label class="small text-secondary mb-1">종류 선택</label>
                <select id="applyLeaveType" class="form-select input-dark fw-bold">
                    <option value="1">종일 연차 (1일)</option>
                    <option value="0.5_am">오전 반차 (0.5일)</option>
                    <option value="0.5_pm">오후 반차 (0.5일)</option>
                </select>
            </div>
            <div class="col-12">
                <label class="small text-secondary mb-1">사유 입력 (선택)</label>
                <input type="text" id="applyLeaveReason" class="form-control input-dark" placeholder="예: 개인사정, 병원 방문 등">
            </div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-secondary w-50 py-2 fw-bold" onclick="document.getElementById('leaveApplyModal').style.display='none'">취소</button>
            <button class="btn btn-success w-50 py-2 fw-bold" onclick="submitLeaveRequest()">신청하기</button>
        </div>
    </div>
</div>

<script>
    let myEmail, myTeamId, userNickname = "관리자", myRole = "member";
    let globalEmailToNick = {};
    let teamMembersInfo = {}; 
    let globalLeaveRecords = [];

    document.addEventListener("DOMContentLoaded", () => {
        let yrHtml = '', moHtml = '';
        let ty = new Date().getFullYear();
        for(let y = ty - 1; y <= ty + 5; y++) yrHtml += `<option value="${y}">${y}년</option>`;
        for(let m = 1; m <= 12; m++) moHtml += `<option value="${m}">${m}월</option>`;
        document.getElementById('calYear').innerHTML = yrHtml;
        document.getElementById('calMonth').innerHTML = moHtml;
        
        let td = new Date();
        document.getElementById('calYear').value = td.getFullYear();
        document.getElementById('calMonth').value = td.getMonth() + 1;

        let savedTheme = localStorage.getItem('kimmoksu_theme');
        if(savedTheme === 'light') document.body.classList.add('light-mode');
    });

    function toggleTheme() {
        let isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('kimmoksu_theme', isLight ? 'light' : 'dark');
    }

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; 
            document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get(); 
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            document.getElementById('userNickDisplay').innerText = userNickname;
            
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { 
                const tDoc = q.docs[0]; myTeamId = tDoc.id; const tData = tDoc.data();
                
                if(tData.owner === myEmail || myEmail === "idong2300@naver.com") myRole = "owner";
                else if(tData.admins && tData.admins.includes(myEmail)) myRole = "admin";
                else myRole = "member";
                
                document.getElementById('userRoleDisplay').innerText = myRole === "owner" ? "에디터 (최고권한)" : (myRole === "admin" ? "관리자" : "팀원");

                const members = tData.members || [];
                await Promise.all(members.map(async m => {
                    try { const u = await db.collection("users").doc(m).get(); globalEmailToNick[m] = u.exists ? u.data().nickname : m.split('@')[0]; }
                    catch(e) { globalEmailToNick[m] = m.split('@')[0]; }
                }));

                loadLeaveData(tData);
            }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    async function handleAuth() { 
        const e=document.getElementById('userEmail').value, p=document.getElementById('userPw').value; 
        const keepAlive = document.getElementById('autoLoginCheck') ? document.getElementById('autoLoginCheck').checked : true;
        try { 
            await auth.setPersistence(keepAlive ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
            await auth.signInWithEmailAndPassword(e,p); 
        } catch(err){alert(err.message);} 
    }
    
    async function resetPassword() {
        const e = document.getElementById('userEmail').value.trim();
        if(!e) return alert("비밀번호를 찾을 이메일을 먼저 입력해주세요.");
        try {
            await auth.sendPasswordResetEmail(e);
            alert("입력하신 이메일로 비밀번호 재설정 링크를 발송했습니다.");
        } catch(err) { alert("이메일 발송 실패: " + err.message); }
    }

    // 💡 연차 데이터 로드 및 관리자 패널 셋팅 💡
    function loadLeaveData(teamData) {
        teamMembersInfo = teamData.membersInfo || {};
        
        // 관리자 패널 활성화
        if(myRole === "owner" || myRole === "admin") {
            document.getElementById('leaveAdminPanel').style.display = 'block';
            document.getElementById('leaveAdminBody').innerHTML = (teamData.members||[]).map(mEmail => {
                let nick = globalEmailToNick[mEmail] || mEmail.split('@')[0];
                let info = teamMembersInfo[mEmail] || { joinDate: '', base: 15, bonus: 0 };
                return `<tr>
                    <td class="fw-bold">${nick}</td>
                    <td><input type="date" class="form-control input-dark leave-join" data-email="${mEmail}" value="${info.joinDate||''}"></td>
                    <td><input type="number" class="form-control input-dark text-center leave-base" data-email="${mEmail}" value="${info.base||15}" style="width:80px; margin:auto;"></td>
                    <td><input type="number" class="form-control input-dark text-center leave-bonus" data-email="${mEmail}" value="${info.bonus||0}" style="width:80px; margin:auto;"></td>
                </tr>`;
            }).join('');
        }

        // 연차 사용 기록 로드 및 계산
        db.collection("leave_records").where("teamId","==",myTeamId).onSnapshot(ss => {
            let used = {}; globalLeaveRecords = [];
            ss.docs.forEach(doc => { 
                let d = doc.data(); d.id = doc.id; 
                // 승인된 연차만 사용 일수에 합산
                if(d.approved) { used[d.userEmail] = (used[d.userEmail] || 0) + parseFloat(d.amount); }
                globalLeaveRecords.push(d); 
            });

            // 잔여 현황판 렌더링
            document.getElementById('leaveStatusBody').innerHTML = (teamData.members||[]).map(mEmail => {
                let nick = globalEmailToNick[mEmail] || mEmail.split('@')[0];
                let info = teamMembersInfo[mEmail] || { joinDate: '-', base: 15, bonus: 0 };
                let resetDate = info.joinDate !== '-' && info.joinDate ? info.joinDate.substring(5) : '-';
                
                let totalGrant = parseFloat(info.base||15) + parseFloat(info.bonus||0);
                let usedAmt = used[mEmail] || 0;
                let remainAmt = totalGrant - usedAmt;
                
                return `<tr>
                    <td class="fw-bold fs-6">${nick}</td>
                    <td class="text-secondary">${resetDate}</td>
                    <td class="text-info">${totalGrant} <span class="small text-secondary">(${info.base||15}+${info.bonus||0})</span></td>
                    <td class="text-danger fw-bold">${usedAmt} 일</td>
                    <td class="text-success fw-bold fs-5">${remainAmt} 일</td>
                </tr>`;
            }).join('');
            
            renderLeaveCalendar();
        });
    }

    // 💡 연차 전용 달력 렌더링 💡
    function renderLeaveCalendar() {
        let year = parseInt(document.getElementById('calYear').value);
        let month = parseInt(document.getElementById('calMonth').value) - 1;
        let firstDay = new Date(year, month, 1).getDay();
        let daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let html = '<div class="d-grid" style="grid-template-columns: repeat(7, 1fr); gap: 6px;">';
        const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
        weekDays.forEach((w, i) => html += `<div class="fw-bold pb-2 border-bottom border-secondary border-opacity-25 ${i===0?'text-danger':i===6?'text-primary':'text-secondary'}">${w}</div>`);
        
        for(let i=0; i<firstDay; i++) html += `<div></div>`;
        
        let monthlyListData = [];

        for(let i=1; i<=daysInMonth; i++) {
            let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let matchRecs = globalLeaveRecords.filter(r => r.date === dateStr);
            
            let barHtml = `<div class="cal-bar-container">` + matchRecs.map(r => {
                monthlyListData.push(r); 
                let colorClass = r.approved ? 'bar-approved' : 'bar-pending';
                let typeClass = r.amount === 1 ? 'bar-full' : (r.type === 'am' ? 'bar-am' : 'bar-pm');
                return `<div class="cal-bar ${colorClass} ${typeClass}"></div>`;
            }).join('') + `</div>`;

            let dw = new Date(year, month, i).getDay();
            html += `<div class="cal-day-box" onclick="toggleCalAccordion('${dateStr}')">
                        <div class="cal-date-num" style="color:${dw===0?'#e03131':dw===6?'#5c7cfa':'#94a3b8'}">${i}</div>
                        ${barHtml}
                    </div>`;
        }
        document.getElementById('leaveCalendar').innerHTML = html + '</div>';

        renderMonthlyLeaveList(monthlyListData);
    }

    // 💡 하단 월간 내역 리스트 💡
    function renderMonthlyLeaveList(records) {
        let listContainer = document.getElementById('monthlyLeaveList');
        if(records.length === 0) {
            listContainer.innerHTML = '<p class="text-secondary text-center m-0 py-3">이번 달은 등록된 연차 현황이 없습니다.</p>';
            return;
        }

        records.sort((a,b) => a.date.localeCompare(b.date)); 
        
        let listHtml = records.map(r => {
            let nick = globalEmailToNick[r.userEmail] || r.userEmail.split('@')[0];
            let typeStr = r.amount === 1 ? '종일 연차' : (r.type === 'am' ? '오전 반차' : '오후 반차');
            let reasonStr = r.reason ? `<br><span class="small text-secondary"><i class="bi bi-chat-quote"></i> ${r.reason}</span>` : '';
            let isOwnerOrAdmin = (myRole === 'owner' || myRole === 'admin');
            let canDelete = r.approved ? isOwnerOrAdmin : (isOwnerOrAdmin || r.userEmail === myEmail);
            let rowClass = r.approved ? 'approved-row' : '';

            return `<div class="leave-detail-item ${rowClass}">
                        <div class="d-flex flex-column">
                            <span class="text-secondary small mb-1">${r.date}</span>
                            <span class="fw-bold fs-6 text-white">${nick} <span class="badge bg-secondary ms-2">${typeStr}</span>${reasonStr}</span>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <label class="m-0 d-flex align-items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="form-check-input m-0" style="width:20px; height:20px;" ${r.approved?'checked':''} ${isOwnerOrAdmin?'':'disabled'} onchange="toggleLeaveApprove('${r.id}', ${r.approved||false})">
                                ${r.approved ? '<span class="text-success fw-bold">승인 완료</span>' : '<span class="text-warning fw-bold">결재 대기</span>'}
                            </label>
                            ${canDelete ? `<button class="btn btn-outline-danger px-3 py-1 fw-bold" onclick="deleteLeaveRecord('${r.id}', '${r.userEmail}', ${r.approved||false})">취소/삭제</button>` : ''}
                        </div>
                    </div>`;
        }).join('');

        listContainer.innerHTML = listHtml;
    }

    // 💡 날짜 클릭 시 아코디언 (상세보기 및 신청) 💡
    function toggleCalAccordion(dateStr) {
        const area = document.getElementById('calAccordionArea'); 
        const content = document.getElementById('calAccordionContent');
        let matchRecs = globalLeaveRecords.filter(r => r.date === dateStr);
        
        let listHtml = matchRecs.map(r => {
            let txt = r.amount === 1 ? '종일 연차' : (r.type === 'am' ? '오전 반차' : '오후 반차');
            let nick = globalEmailToNick[r.userEmail] || r.userEmail.split('@')[0];
            let isOwnerOrAdmin = (myRole === 'owner' || myRole === 'admin');
            let canDelete = r.approved ? isOwnerOrAdmin : (isOwnerOrAdmin || r.userEmail === myEmail);
            let rowClass = r.approved ? 'approved-row' : '';
            return `<div class="leave-detail-item ${rowClass}">
                        <div class="fw-bold text-white">${nick} <span class="badge bg-secondary ms-2">${txt}</span> ${r.reason ? `<span class="small text-secondary ms-2">(${r.reason})</span>` : ''}</div>
                        <div class="d-flex align-items-center gap-3">
                            <label class="m-0 d-flex align-items-center gap-1 small cursor-pointer">
                                <input type="checkbox" class="form-check-input m-0" ${r.approved?'checked':''} ${isOwnerOrAdmin?'':'disabled'} onchange="toggleLeaveApprove('${r.id}', ${r.approved||false})">
                                ${r.approved ? '<span class="text-success fw-bold">승인 완료</span>' : '<span class="text-warning">대기중</span>'}
                            </label>
                            ${canDelete ? `<button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteLeaveRecord('${r.id}', '${r.userEmail}', ${r.approved||false})"><i class="bi bi-trash"></i></button>` : ''}
                        </div>
                    </div>`;
        }).join('');
        
        if(!listHtml) listHtml = `<p class="text-secondary small text-center m-0 py-3">해당 일자에 신청 내역이 없습니다.</p>`;
        
        content.innerHTML = `<h5 class="fw-bold text-primary mb-3">${dateStr}</h5>${listHtml}<button class="btn btn-primary w-100 mt-4 py-3 fw-bold fs-6" onclick="openLeaveModal('${dateStr}')">+ 이 날짜로 나의 휴가 신청하기</button>`;
        area.style.display = 'block'; 
        area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function toggleLeaveApprove(id, current) {
        if(myRole !== 'owner' && myRole !== 'admin') return alert("관리자만 승인할 수 있습니다.");
        await db.collection("leave_records").doc(id).update({ approved: !current });
    }
    
    async function deleteLeaveRecord(id, email, approved) {
        let isOwnerOrAdmin = (myRole === 'owner' || myRole === 'admin');
        if (approved && !isOwnerOrAdmin) return alert("이미 승인된 연차는 관리자만 삭제(취소) 가능합니다.");
        if (!approved && !isOwnerOrAdmin && email !== myEmail) return alert("본인의 신청 내역만 삭제할 수 있습니다.");
        if (confirm("정말 이 휴가 신청을 취소/삭제하시겠습니까?")) { 
            await db.collection("leave_records").doc(id).delete(); 
            document.getElementById('calAccordionArea').style.display = 'none'; 
        }
    }
    
    function openLeaveModal(d) { 
        document.getElementById('applyLeaveDate').value = d; 
        document.getElementById('applyLeaveReason').value = '';
        document.getElementById('leaveApplyModal').style.display = 'flex';
    }
    
    async function submitLeaveRequest() {
        let d = document.getElementById('applyLeaveDate').value; 
        let tVal = document.getElementById('applyLeaveType').value;
        let reason = document.getElementById('applyLeaveReason').value.trim();

        await db.collection("leave_records").add({ 
            teamId: myTeamId, 
            userEmail: myEmail, 
            date: d, 
            amount: tVal === '1' ? 1 : 0.5, 
            type: tVal === '1' ? 'full' : (tVal === '0.5_am' ? 'am' : 'pm'), 
            reason: reason, 
            approved: false, // 처음 신청 시 무조건 대기 상태
            createdAt: Date.now() 
        }); 
        
        document.getElementById('leaveApplyModal').style.display = 'none'; 
        document.getElementById('calAccordionArea').style.display = 'none';
        alert("휴가 신청이 완료되었습니다. 관리자 승인을 기다려주세요.");
    }
    
    async function saveLeaveSettings() {
        let newInfo = {};
        document.querySelectorAll('.leave-join').forEach(el => { let email = el.getAttribute('data-email'); if(!newInfo[email]) newInfo[email]={}; newInfo[email].joinDate = el.value; });
        document.querySelectorAll('.leave-base').forEach(el => { let email = el.getAttribute('data-email'); if(!newInfo[email]) newInfo[email]={}; newInfo[email].base = parseFloat(el.value||15); });
        document.querySelectorAll('.leave-bonus').forEach(el => { let email = el.getAttribute('data-email'); if(!newInfo[email]) newInfo[email]={}; newInfo[email].bonus = parseFloat(el.value||0); });
        
        await db.collection("teams").doc(myTeamId).update({ membersInfo: newInfo }); 
        alert("팀원 연차 셋팅값이 저장되었습니다.");
    }
</script>
</body>
</html>
