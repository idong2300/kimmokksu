<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta property="og:title" content="김목수이야기 - All-in-One 시스템">
    <meta property="og:image" content="og-image.png">

    <title>김목수이야기 - 통합 관리 대시보드</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --sidebar-bg: #0f172a;
            --card-bg: #1e293b;
            --primary-accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }

        /* [레이아웃] 사이드바 & 메인 영역 */
        .app-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; transition: 0.3s;
        }

        .main-container { flex: 1; overflow-y: auto; position: relative; background-color: var(--bg-deep); }

        /* [메뉴 스타일 & POP 효과] */
        .nav-link {
            color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: flex; align-items: center; text-decoration: none;
        }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active {
            background-color: var(--primary-accent); color: white;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        /* [콘텐츠 섹션 제어] */
        .page-section { display: none; padding: 40px; animation: fadeIn 0.4s ease-out; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* [작업일보 전용 스타일 - 기존과 동일] */
        .excel-table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-bottom: 10px; table-layout: fixed; border: 2px solid #4b5563; }
        .excel-table td { border: 1px solid #4b5563; text-align: center; height: 38px; font-size: 0.85rem; color: white; }
        .date-row td { height: 22px !important; background: #2d3748; font-size: 0.75rem; }
        .name-cell { width: 75px; background: #1a202c !important; }
        .gongsu-cell { cursor: pointer; font-weight: bold; -webkit-user-select: none; user-select: none; }
        .g-green { background: rgba(16, 185, 129, 0.2) !important; color: #10b981 !important; }
        .g-yellow { background: rgba(245, 158, 11, 0.2) !important; color: #f59e0b !important; }
        .g-red { background: rgba(239, 68, 68, 0.2) !important; color: #ef4444 !important; }

        /* 로그인 화면 전용 */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <img src="kimmoksu_main_logo.png" style="max-width: 180px; margin-bottom: 30px;">
        <h3 id="auth-title" class="mb-4 fw-bold">현장 관리 접속</h3>
        <input type="text" id="userNick" class="form-control bg-dark text-white border-secondary mb-3" placeholder="닉네임" style="display:none;">
        <input type="email" id="userEmail" class="form-control bg-dark text-white border-secondary mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control bg-dark text-white border-secondary mb-4" placeholder="비밀번호">
        <button class="btn btn-primary w-100 fw-bold py-2" onclick="handleAuth()">접속하기</button>
        <p class="mt-4 text-secondary small" onclick="toggleAuthMode()" style="cursor:pointer;">계정이 없으신가요? <b class="text-primary">회원가입</b></p>
    </div>
</div>

<div class="app-wrapper">
    <nav class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px;">
        </div>
        
        <div class="flex-grow-1 mt-4">
            <div class="nav-link active" onclick="showPage('home', this)"><i class="bi bi-house-door"></i> 대시보드</div>
            <div class="nav-link" onclick="showPage('worklog', this)"><i class="bi bi-journal-check"></i> 실전 작업일보</div>
            <div class="nav-link" onclick="showPage('t5', this)"><i class="bi bi-calculator"></i> T5 계산기</div>
        </div>

        <div class="p-4 border-top border-secondary border-opacity-10">
            <div class="d-flex align-items-center">
                <i class="bi bi-person-circle fs-3 me-3 text-primary"></i>
                <div class="flex-grow-1 overflow-hidden">
                    <div id="userNickDisplay" class="fw-bold text-truncate">사용자</div>
                    <div class="small text-secondary" style="font-size:0.7rem;">Story of Kimmoksu</div>
                </div>
                <i class="bi bi-box-arrow-right text-danger fs-4 cursor-pointer" onclick="handleLogout()" style="cursor:pointer;"></i>
            </div>
        </div>
    </nav>

    <main class="main-container">
        
        <section id="page-home" class="page-section active">
            <h1 id="welcomeMsg" class="fw-bold mb-3">반갑습니다!</h1>
            <p class="text-secondary fs-5 mb-5">오늘의 현장 관리를 시작하세요.</p>
            <div class="row g-4">
                <div class="col-md-6"><div class="dash-card p-4 h-100 bg-dark border-secondary border-opacity-25 rounded-4" onclick="showPage('worklog', document.querySelectorAll('.nav-link')[1])"><h3>📝 작업일보 작성</h3><p class="text-secondary">공수 기입 및 엑셀 출력을 시작합니다.</p></div></div>
                <div class="col-md-6"><div class="dash-card p-4 h-100 bg-dark border-secondary border-opacity-25 rounded-4" onclick="showPage('t5', document.querySelectorAll('.nav-link')[2])"><h3>💡 T5 물량 산출</h3><p class="text-secondary">간접조명 자재 수량을 계산합니다.</p></div></div>
            </div>
        </section>

        <section id="page-worklog" class="page-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">실전 작업일보</h2>
                <button onclick="addTeam()" class="btn btn-outline-primary btn-sm">+ 공정 추가</button>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-5"><input type="month" id="logMonth" class="form-control bg-dark text-white border-secondary"></div>
                <div class="col-7"><input type="text" id="siteName" class="form-control bg-dark text-white border-secondary" placeholder="현장명 입력"></div>
            </div>
            <div id="team-container"></div>
            <button class="btn btn-success w-100 mt-4 mb-5 fw-bold" onclick="saveMonthlyLog()">현장 데이터 최종 저장 💾</button>
            <hr class="border-secondary opacity-25">
            <h4 class="fw-bold mt-5 mb-3">📂 저장된 기록</h4>
            <div id="history-list"></div>
        </section>

        <section id="page-t5" class="page-section text-center">
            <h2 class="fw-bold mb-4">T5 조명 계산기</h2>
            <div class="alert alert-info bg-dark text-info border-info border-opacity-25">업데이트 중입니다. 기존 T5 기능을 여기에 통합할 예정입니다.</div>
        </section>

    </main>
</div>

<script>
    /* [인증 및 페이지 제어 로직] */
    let myEmail, myTeamId, editingId = null, userNickname = "관리자";
    let isLoginMode = true;
    let teamData = [{ teamName: "목공팀", workers: [] }];

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email;
            document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get();
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            document.getElementById('userNickDisplay').innerText = userNickname;
            document.getElementById('welcomeMsg').innerText = `${userNickname}님, 반갑습니다!`;
            await findTeam(); loadHistory(); renderAllTeams();
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
        }
    });

    function showPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    }

    async function findTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { myTeamId = q.docs[0].id; }
    }

    /* [작업일보 핵심 로직 - 기존과 100% 동일] */
    function renderAllTeams() {
        const container = document.getElementById('team-container');
        const [year, month] = (document.getElementById('logMonth').value || "2026-04").split('-').map(Number);
        const lastDay = new Date(year, month, 0).getDate();
        container.innerHTML = teamData.map((team, tIdx) => {
            let teamTotal = 0;
            const tables = team.workers.map((w, wIdx) => {
                let pSum = 0;
                Object.values(w.days).forEach(v => pSum += parseFloat(v || 0));
                teamTotal += pSum;
                return `
                <table class="excel-table">
                    <tr class="date-row"><td rowspan="4" class="name-cell">${w.name}<br><button onclick="removeWorker(${tIdx}, ${wIdx})" class="btn btn-danger btn-xs py-0 px-1 mt-1" style="font-size:0.6rem;">삭제</button></td>${loopDays(year, month, 1, 16, 'date')}</tr>
                    <tr>${loopDays(year, month, 1, 16, 'input', tIdx, wIdx)}</tr>
                    <tr class="date-row">${loopDays(year, month, 17, 31, 'date', 0, 0, lastDay)}<td style="background:#1a202c;">계</td></tr>
                    <tr>${loopDays(year, month, 17, 31, 'input', tIdx, wIdx, lastDay)}<td class="fw-bold text-primary">${pSum % 1 === 0 ? pSum : pSum.toFixed(1)}</td></tr>
                </table>`;
            }).join('');
            return `<div class="mb-4"><div class="d-flex justify-content-between align-items-center mb-2"><h5 class="m-0 fw-bold text-info">${team.teamName}</h5><button onclick="addWorker(${tIdx})" class="btn btn-outline-info btn-xs py-0 px-2">+</button></div>${tables}<div class="text-end small text-secondary">소계: ${teamTotal.toFixed(1)}</div></div>`;
        }).join('');
        bindLongPress();
    }

    function loopDays(y, m, start, end, type, tIdx, wIdx, lastDay = 31) {
        let html = "";
        for (let d = start; d <= end; d++) {
            const isInvalid = d > lastDay;
            if (type === 'date') html += `<td>${isInvalid ? '' : d}</td>`;
            else {
                if (isInvalid) html += `<td style="background:#0f172a;"></td>`;
                else {
                    const val = teamData[tIdx].workers[wIdx].days[d] || "";
                    let c = ""; if(val) { const n=parseFloat(val); c = n>2?"g-red":n>1?"g-yellow":"g-green"; }
                    html += `<td class="gongsu-cell ${c}" data-t="${tIdx}" data-w="${wIdx}" data-d="${d}" onclick="handleCellClick(this)">${val}</td>`;
                }
            }
        }
        return html;
    }

    function handleCellClick(el) {
        const { t, w, d } = el.dataset;
        teamData[t].workers[w].days[d] = (teamData[t].workers[w].days[d] == 1 ? "" : 1);
        renderAllTeams();
    }

    function bindLongPress() {
        document.querySelectorAll('.gongsu-cell').forEach(cell => {
            let timer;
            cell.onmousedown = cell.ontouchstart = () => timer = setTimeout(() => {
                const { t, w, d } = cell.dataset;
                const input = prompt("공수 직접 입력", teamData[t].workers[w].days[d]);
                if (input !== null) { teamData[t].workers[w].days[d] = input; renderAllTeams(); }
            }, 700);
            cell.onmouseup = cell.ontouchend = () => clearTimeout(timer);
        });
    }

    async function saveMonthlyLog() {
        const month = document.getElementById('logMonth').value;
        const site = document.getElementById('siteName').value.trim();
        if(!site) return alert("현장명을 입력하세요.");
        await db.collection("monthly_logs").add({ teamId: myTeamId, month, site, teamData, updatedAt: Date.now(), writer: userNickname });
        alert("저장되었습니다!"); location.reload();
    }

    function loadHistory() {
        db.collection("monthly_logs").where("teamId","==", myTeamId).orderBy("updatedAt","desc").limit(10).onSnapshot(ss => {
            document.getElementById('history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `<div class="p-3 bg-dark border border-secondary border-opacity-25 rounded-3 mb-2 d-flex justify-content-between align-items-center">
                    <div><small class="text-primary">${d.month}</small><br><b>${d.site}</b></div>
                    <button class="btn btn-success btn-sm" onclick="exportToExcel('${doc.id}')">엑셀</button>
                </div>`;
            }).join('');
        });
    }

    // [인증 관련]
    function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "현장 관리 접속" : "회원가입 시작"; document.getElementById('userNick').style.display = isLoginMode ? "none" : "block"; }
    async function handleAuth() { /* 이메일/PW 로그인 로직 그대로 사용 */ }
    async function handleLogout() { if(confirm("로그아웃 하시겠습니까?")) await auth.signOut(); }

    document.getElementById('logMonth').onchange = renderAllTeams;
</script>
</body>
</html>
